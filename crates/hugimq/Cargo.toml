[package]
name = "hugimq"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.37.0", features = ["full"] }
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0"
tower = "0.4.13"
tower-http = { version = "0.5.2", features = ["full"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
futures = "0.3.30"
futures-util = "0.3"
bytes = "1.6.0"
dashmap = "6.1.0"
tonic = "0.12"
prost = "0.13"
axum = { version = "0.7", features = ["ws"] }
url = "2.5"

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "hugimq-server"
path = "src/main.rs"

[lib]
path = "src/lib.rs"
