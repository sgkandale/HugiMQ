[package]
name = "hugimq"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7.5"
tokio = { version = "1.37.0", features = ["full"] }
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.115"
tower = "0.4.13"
tower-http = { version = "0.5.2", features = ["full"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
futures = "0.3.30"
async-stream = "0.3.5"
bytes = "1.6.0"
rmp-serde = "1.2.0"

[[bin]]
name = "hugimq-server"
path = "src/main.rs"

[lib]
path = "src/lib.rs"
